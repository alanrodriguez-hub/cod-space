<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 420" width="1920" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="35%" stop-color="#0f2347"/>
      <stop offset="65%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="420" fill="url(#bg)"/>

  <!-- Background glow -->
  <ellipse cx="1400" cy="210" rx="300" ry="180" fill="url(#accent)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="70" x2="1920" y2="70" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="350" x2="1920" y2="350" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Abstract truck icon on right -->
  <g transform="translate(1380, 130)" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.3">
    <!-- Cargo box -->
    <rect x="40" y="30" width="100" height="70" rx="4"/>
    <!-- Cab -->
    <rect x="140" y="45" width="50" height="55" rx="4"/>
    <!-- Windshield -->
    <line x1="155" y1="45" x2="155" y2="65"/>
    <line x1="155" y1="65" x2="140" y2="65"/>
    <!-- Wheels -->
    <circle cx="75" cy="110" r="12"/>
    <circle cx="165" cy="110" r="12"/>
    <!-- Speed lines -->
    <line x1="200" y1="55" x2="220" y2="55"/>
    <line x1="200" y1="70" x2="225" y2="70"/>
    <line x1="200" y1="85" x2="220" y2="85"/>
  </g>

  <!-- Map pin dots decoration -->
  <g fill="#60a5fa" fill-opacity="0.15">
    <circle cx="1550" cy="180" r="4"/>
    <circle cx="1580" cy="195" r="3"/>
    <circle cx="1610" cy="175" r="5"/>
    <circle cx="1640" cy="210" r="3"/>
    <circle cx="1570" cy="250" r="4"/>
    <circle cx="1600" cy="270" r="3"/>
    <circle cx="1630" cy="245" r="4"/>
  </g>

  <!-- Connecting lines (route) -->
  <g stroke="#60a5fa" stroke-opacity="0.1" stroke-width="1.5" fill="none">
    <path d="M1550,180 C1570,200 1590,190 1610,175"/>
    <path d="M1580,195 C1600,210 1620,220 1640,210"/>
    <path d="M1570,250 C1590,260 1610,270 1630,245"/>
  </g>
</svg>
