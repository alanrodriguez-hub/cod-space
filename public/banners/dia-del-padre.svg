<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 420" width="1920" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0a0e"/>
      <stop offset="35%" stop-color="#4a1a2e"/>
      <stop offset="65%" stop-color="#8b2f4a"/>
      <stop offset="100%" stop-color="#c0843d"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="420" fill="url(#bg)"/>

  <!-- Right-side content group (figures centered for mobile visibility) -->
  <g transform="translate(-500, 0)">
    <!-- ========== FATHER FIGURE ========== -->
    <g fill="url(#figure)">
      <circle cx="1500" cy="158" r="24"/>
      <ellipse cx="1500" cy="228" rx="38" ry="54"/>
      <rect x="1472" y="270" width="16" height="92" rx="7" transform="rotate(-6, 1480, 270)"/>
      <rect x="1510" y="270" width="16" height="92" rx="7" transform="rotate(8, 1518, 270)"/>
    </g>

    <!-- Father's left arm -->
    <path d="M1470,190 C1420,210 1400,255 1430,280 C1445,292 1460,285 1475,270" stroke="url(#figure)" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- ========== CHILD FIGURE ========== -->
    <g fill="url(#figure)">
      <circle cx="1568" cy="198" r="17"/>
      <ellipse cx="1568" cy="256" rx="24" ry="38"/>
      <rect x="1554" y="285" width="12" height="75" rx="5" transform="rotate(-5, 1560, 285)"/>
      <rect x="1572" y="285" width="12" height="75" rx="5" transform="rotate(5, 1578, 285)"/>
    </g>

    <!-- Child's arms -->
    <path d="M1550,230 C1535,240 1525,255 1520,270" stroke="url(#figure)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M1562,230 C1548,242 1540,258 1538,270" stroke="url(#figure)" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- Father's right arm -->
    <path d="M1528,195 C1548,210 1558,240 1548,265" stroke="url(#figure)" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- Heart between them -->
    <g transform="translate(1560, 125) scale(0.6)">
      <path d="M0,10 C-15,-5 -30,-5 -30,10 C-30,25 0,40 0,40 C0,40 30,25 30,10 C30,-5 15,-5 0,10Z" fill="url(#heartGrad)"/>
    </g>

    <!-- Warm glow behind figures -->
    <ellipse cx="1520" cy="240" rx="120" ry="100" fill="#f59e0b" fill-opacity="0.06"/>

    <!-- Subtle sparkles -->
    <g fill="#fcd34d" fill-opacity="0.3">
      <circle cx="1430" cy="140" r="2"/>
      <circle cx="1445" cy="120" r="1.5"/>
      <circle cx="1610" cy="170" r="2"/>
      <circle cx="1630" cy="190" r="1.5"/>
      <circle cx="1650" cy="300" r="2"/>
      <circle cx="1400" cy="310" r="1.5"/>
    </g>
  </g>

  <!-- Decorative horizontal lines (subtle) -->
  <line x1="0" y1="70" x2="1920" y2="70" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="350" x2="1920" y2="350" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.08"/>
</svg>
