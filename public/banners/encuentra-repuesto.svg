<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 420" width="1920" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0e1a"/>
      <stop offset="35%" stop-color="#3a1040"/>
      <stop offset="65%" stop-color="#7a2a6a"/>
      <stop offset="100%" stop-color="#c0553a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="420" fill="url(#bg)"/>

  <!-- Background glow -->
  <ellipse cx="1400" cy="210" rx="300" ry="180" fill="url(#accent)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="70" x2="1920" y2="70" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.08"/>
  <line x1="0" y1="350" x2="1920" y2="350" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Magnifying glass / search icon on right -->
  <g transform="translate(1430, 125)" fill="none" stroke="#c084fc" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.35">
    <!-- Lens -->
    <circle cx="60" cy="60" r="50"/>
    <!-- Handle -->
    <line x1="95" y1="95" x2="130" y2="130"/>
  </g>

  <!-- Gear / mechanical dots suggesting auto parts -->
  <g fill="#c084fc" fill-opacity="0.15">
    <circle cx="1560" cy="165" r="5"/>
    <circle cx="1590" cy="155" r="3"/>
    <circle cx="1620" cy="170" r="4"/>
    <circle cx="1550" cy="200" r="3"/>
    <circle cx="1600" cy="210" r="5"/>
    <circle cx="1640" cy="195" r="3"/>
    <circle cx="1570" cy="240" r="4"/>
    <circle cx="1610" cy="255" r="3"/>
    <circle cx="1635" cy="245" r="2"/>
    <circle cx="1650" cy="290" r="4"/>
    <circle cx="1580" cy="290" r="3"/>
  </g>

  <!-- Concentric arcs suggesting search/scan -->
  <g fill="none" stroke="#c084fc" stroke-width="1" stroke-opacity="0.1">
    <path d="M1540,130 A100,100 0 0,1 1680,200"/>
    <path d="M1530,115 A120,120 0 0,1 1700,210"/>
  </g>
</svg>
